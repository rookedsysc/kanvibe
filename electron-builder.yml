appId: com.kanvibe.desktop
productName: KanVibe
asar: false

directories:
  output: dist
  buildResources: resources

files:
  - build/renderer/**/*
  - electron/**/*
  - messages/**/*
  - package.json
  - public/**/*
  - tsconfig.json
  - src/**/*

extraResources:
  - from: resources/database
    to: database
    filter:
      - app.seed.db

mac:
  target:
    - dmg
    - zip

publish: null
